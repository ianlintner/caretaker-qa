name: Nightly Scan

on:
  schedule:
    - cron: "0 2 * * *"  # daily 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install
        run: uv sync

      - name: Run scan
        env:
          AZURE_API_BASE: ${{ secrets.AZURE_API_BASE }}
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
          AZURE_AI_API_BASE: ${{ secrets.AZURE_AI_API_BASE }}
          AZURE_AI_API_KEY: ${{ secrets.AZURE_AI_API_KEY }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || 'azure_ai/gpt-4o' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p reports
          DATE=$(date -u +%Y-%m-%d)
          uv run qa-agent scan \
            --since 24h \
            --watchlist watchlist.yml \
            --out "reports/${DATE}.md" \
            --out-json "reports/${DATE}.json"

      - name: Open PR if brief changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(report): nightly security brief"
          title: "chore(report): nightly security brief ${{ github.run_id }}"
          body: |
            Auto-generated by `.github/workflows/nightly.yml`.

            A snapshot of the current security-relevance brief sits in `reports/`.
            Merge to commit, close to discard.
          branch: "report/nightly-${{ github.run_id }}"
          delete-branch: true
          labels: |
            report
            auto-generated
