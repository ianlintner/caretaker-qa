name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - "*.*.*"
      - "v*.*.*"
      - "*.*.*-*"
      - "v*.*.*-*"
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ format('{0}-{1}', github.workflow, github.event.pull_request.number || github.ref) }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  OAUTH2_JWT_SECRET: "test-jwt-secret-for-ci-only-do-not-use-in-production-32chars"
  # Always define this so workflow expressions referencing env.IMAGE_VERSION are valid.
  # On tag builds, it's overwritten by the "Compute release version" step.
  IMAGE_VERSION: "0.0.0-dev"

jobs:
  # Detects whether this push/PR touches anything that needs the Rust pipeline.
  # Docs/markdown-only changes set code=false, which skips the heavy compile/
  # build/e2e steps while the required-context jobs (checks, security) still run
  # and report success (their expensive steps are gated on this output).
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7.0.0 # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain*'
              - 'Dockerfile*'
              - '.dockerignore'
              - 'migrations/**'
              - 'scripts/**'
              - 'tests/**'
              - 'templates/**'
              - 'static/**'
              - 'deny.toml'
              - 'audit.toml'
              - '.cargo/**'
              - 'supply-chain/**'
              - '.github/workflows/**'
              - '.github/actions/**'

  checks:
    name: Checks (fmt, clippy, test)
    runs-on: ubuntu-latest
    needs: [changes]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.0 # v6

      - name: Rust toolchain + cache
        if: needs.changes.outputs.code == 'true'
        uses: ./.github/actions/rust-setup
        with:
          toolchain: stable
          components: rustfmt, clippy
          # Shared debug-profile cache: integration/mongo (db-tests) restore the
          # artifacts compiled here instead of rebuilding the workspace.
          cache-key: debug
          install-system-deps: "true"

      - name: Check formatting
        if: needs.changes.outputs.code == 'true'
        run: cargo fmt --all -- --check

      - name: Clippy linting
        if: needs.changes.outputs.code == 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        if: needs.changes.outputs.code == 'true'
        run: cargo test --verbose --all-features --locked

      # Compliance matrix is only published by the (main-only) docs job, so the
      # re-run + report + upload only need to happen on push events.
      - name: Compliance test results capture
        if: needs.changes.outputs.code == 'true' && github.event_name == 'push'
        # Re-run only the RFC-tagged compliance tests with stable libtest
        # pretty output captured to a file. The compliance_report tool then
        # folds these results into the matrix as real pass/fail/ignored.
        # The full `Run tests` step above already validated the suite, so
        # this re-run is fast (compilation cached) and tolerant of failures
        # (compliance_report itself does not fail the job).
        run: |
          mkdir -p target
          cargo test --no-fail-fast --all-features --locked \
            --test 'compliance_*' --test 'rfc_compliance' \
            --test 'rfc8252_native_apps' --test 'rfc9700_*' \
            --test 'phase2_rfc_compliance' \
            -- --test-threads=1 \
            > target/compliance-tests.txt 2>&1 || true

      - name: Generate compliance report (with results)
        if: needs.changes.outputs.code == 'true' && github.event_name == 'push'
        run: cargo run --bin compliance_report -- --results target/compliance-tests.txt

      - name: Upload compliance artifacts
        if: needs.changes.outputs.code == 'true' && github.event_name == 'push'
        uses: actions/upload-artifact@v7.0.1 # v7
        with:
          name: rfc-compliance-report
          path: |
            docs/compliance/RFC_COMPLIANCE.md
            target/compliance-report.json
            target/compliance-junit.xml
            target/compliance-tests.txt
          if-no-files-found: error

  build-binaries:
    name: Build release binaries
    runs-on: ubuntu-latest
    needs: [changes, checks]
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7.0.0 # v6

      - name: Rust toolchain + cache
        uses: ./.github/actions/rust-setup
        with:
          toolchain: stable
          cache-key: build-binaries
          install-system-deps: "true"

      # cross (arm64) is only needed for the multi-arch images published on
      # main/tags. PRs build a single debug amd64 binary for the e2e image.
      - name: Install cross (for arm64 builds)
        if: github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        uses: taiki-e/install-action@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2.75.18
        with:
          tool: cross

      - name: Build server binary/binaries
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]] && \
             ([[ "${GITHUB_REF}" == "refs/heads/${{ github.event.repository.default_branch }}" ]] || \
              [[ "${GITHUB_REF}" == refs/tags/* ]]); then
            # Release path: multi-arch (amd64 + cross arm64) + mongo variants for
            # the published images.
            bash .github/scripts/build_release_binaries.sh --include-mongo-variants
          else
            # PR/develop path: the only consumer is e2e-kind, which loads a
            # single-arch amd64 image. A debug build is much faster than release
            # and skips the slow cross arm64 compile entirely.
            cargo build --locked
            mkdir -p target/release
            cp target/debug/rust_oauth2_server target/release/rust_oauth2_server-amd64
          fi

      - name: Upload release binary artifact (linux/amd64)
        uses: actions/upload-artifact@v7.0.1 # v7
        with:
          name: rust_oauth2_server-linux-amd64
          path: target/release/rust_oauth2_server-amd64
          if-no-files-found: error

      - name: Upload release binary artifact (linux/arm64)
        if: github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        uses: actions/upload-artifact@v7.0.1 # v7
        with:
          name: rust_oauth2_server-linux-arm64
          path: target/release/rust_oauth2_server-arm64
          if-no-files-found: error

      - name: Upload release binary artifact (linux/amd64, mongo feature)
        if: github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        uses: actions/upload-artifact@v7.0.1 # v7
        with:
          name: rust_oauth2_server-mongo-linux-amd64
          path: target/release/rust_oauth2_server-mongo-amd64
          if-no-files-found: error

      - name: Upload release binary artifact (linux/arm64, mongo feature)
        if: github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        uses: actions/upload-artifact@v7.0.1 # v7
        with:
          name: rust_oauth2_server-mongo-linux-arm64
          path: target/release/rust_oauth2_server-mongo-arm64
          if-no-files-found: error

      - name: Upload release binary artifact (linux/amd64, mongo-only; no SQLx)
        if: github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        uses: actions/upload-artifact@v7.0.1 # v7
        with:
          name: rust_oauth2_server-mongo-only-linux-amd64
          path: target/release/rust_oauth2_server-mongo-only-amd64
          if-no-files-found: error

      - name: Upload release binary artifact (linux/arm64, mongo-only; no SQLx)
        if: github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        uses: actions/upload-artifact@v7.0.1 # v7
        with:
          name: rust_oauth2_server-mongo-only-linux-arm64
          path: target/release/rust_oauth2_server-mongo-only-arm64
          if-no-files-found: error

  security:
    name: Security (audit, deny, vet)
    runs-on: ubuntu-latest
    needs: [changes]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0 # v6

      - name: Rust toolchain + cache
        if: needs.changes.outputs.code == 'true'
        uses: ./.github/actions/rust-setup
        with:
          toolchain: stable
          cache-key: security
          install-system-deps: "true"

      - name: Install cargo-audit + cargo-vet
        if: needs.changes.outputs.code == 'true'
        uses: taiki-e/install-action@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2.75.18
        with:
          tool: cargo-audit,cargo-vet

      - name: Security Audit (cargo-audit)
        if: needs.changes.outputs.code == 'true'
        run: cargo audit

      - name: Check Dependencies (cargo-deny)
        if: needs.changes.outputs.code == 'true'
        uses: EmbarkStudios/cargo-deny-action@175dc7fd4fb85ec8f46948fb98f44db001149081 # v2
        with:
          command: check

      # Supply-chain trust gate: every dependency must be audited (by us or a
      # trusted import) or explicitly exempted. New/updated crates that are not
      # vouched for fail the build. --locked pins the imported audit sets.
      - name: Supply-chain review (cargo-vet)
        if: needs.changes.outputs.code == 'true'
        run: cargo vet --locked

  # Integration (Postgres) + Mongo storage tests in one job: both are
  # Docker-backed debug-profile suites, and sharing the `debug` cache lets them
  # restore the artifacts already compiled by `checks`.
  db-tests:
    name: Database Tests (postgres, mongo)
    runs-on: ubuntu-latest
    needs: [changes, checks]
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: oauth2_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7.0.0 # v6

      - name: Rust toolchain + cache
        uses: ./.github/actions/rust-setup
        with:
          toolchain: stable
          cache-key: debug
          install-system-deps: "true"

      - name: Run Flyway Migrations
        run: |
          docker run --rm --network host -v ${{ github.workspace }}/migrations/sql:/flyway/sql \
            flyway/flyway:10-alpine \
            -url=jdbc:postgresql://localhost:5432/oauth2_test \
            -user=test_user \
            -password=test_password \
            -connectRetries=20 \
            -connectRetriesInterval=3 \
            -locations=filesystem:/flyway/sql \
            migrate

      - name: Run Integration Tests (Postgres)
        env:
          OAUTH2_DATABASE_URL: postgresql://test_user:test_password@localhost:5432/oauth2_test
        run: cargo test --test integration --locked

      - name: Run Mongo storage tests (requires Docker)
        env:
          RUN_TESTCONTAINERS: "1"
        run: cargo test --test mongo_storage --features mongo --locked

  # E2E Tests on KIND (reuses prebuilt binaries from the build-binaries job)
  e2e-kind:
    needs: [changes, build-binaries]
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/reusable-kind-e2e.yml
    with:
      job_name: E2E Tests on KIND
      script_path: scripts/e2e_kind.sh
      use_prebuilt_binaries: true
      timeout_minutes: 35
      enable_config_debug: true

  # Docker Build
  docker:
    name: Docker (${{ matrix.variant_name }})
    runs-on: ubuntu-latest
    needs: [build-binaries, security, db-tests, e2e-kind]
    if: github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant_name: base
            artifact_prefix: rust_oauth2_server
            binary_suffix: ""
            tag_suffix: ""
          - variant_name: mongo
            artifact_prefix: rust_oauth2_server-mongo
            binary_suffix: -mongo
            tag_suffix: -mongo
          - variant_name: mongo-only
            artifact_prefix: rust_oauth2_server-mongo-only
            binary_suffix: -mongo-only
            tag_suffix: -mongo-only
    steps:
      - uses: actions/checkout@v7.0.0 # v6

      - name: Download prebuilt server binary (amd64)
        uses: actions/download-artifact@v7.0.0 # v7
        with:
          name: ${{ matrix.artifact_prefix }}-linux-amd64
          path: target/release

      - name: Download prebuilt server binary (arm64)
        uses: actions/download-artifact@v7.0.0 # v7
        with:
          name: ${{ matrix.artifact_prefix }}-linux-arm64
          path: target/release

      - name: Ensure binaries are executable
        run: |
          chmod +x \
            "target/release/rust_oauth2_server${{ matrix.binary_suffix }}-amd64" \
            "target/release/rust_oauth2_server${{ matrix.binary_suffix }}-arm64"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Decide publishing targets
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ secrets.DOCKER_USERNAME }}" && -n "${{ secrets.DOCKER_TOKEN }}" ]]; then
            echo "dockerhub=true" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v4.2.0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Docker Hub
        if: steps.publish.outputs.dockerhub == 'true'
        uses: docker/login-action@v4.2.0 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Compute release version (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          ref_name='${{ github.ref_name }}'
          version="${ref_name#v}"

          # Enforce numeric semver-ish tags for releases (e.g., 0.0.1 or v0.0.1, optionally with -rc.1).
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "Tag '$ref_name' is not a valid release version (expected like 0.0.1 or v0.0.1)."
            exit 1
          fi

          # Refuse to publish an image whose tag disagrees with the workspace
          # Cargo.toml. The canonical release flow (release.yml) bumps
          # Cargo.toml in the same commit it tags, so a mismatch means the
          # tag was created outside that flow (e.g. manual gh release create)
          # and would produce an image labeled X.Y.Z whose binary reports a
          # different CARGO_PKG_VERSION.
          cargo_version=$(grep -m1 -E '^version[[:space:]]*=' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ "$cargo_version" != "$version" ]]; then
            echo "Tag '$ref_name' (-> $version) does not match workspace Cargo.toml version ($cargo_version)." >&2
            echo "Refusing to publish a versioned image whose binary CARGO_PKG_VERSION would disagree with the image tag." >&2
            echo "If this is a real release, cut it via the release.yml workflow so Cargo.toml is bumped atomically." >&2
            exit 1
          fi

          echo "IMAGE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Extract metadata (GHCR)
        id: meta_ghcr
        uses: docker/metadata-action@v6.1.0 # v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/oauth2-server
          tags: |
            type=raw,value=latest${{ matrix.tag_suffix }},enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,format=short,suffix=${{ matrix.tag_suffix }},enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=${{ env.IMAGE_VERSION }}${{ matrix.tag_suffix }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Extract metadata (Docker Hub)
        if: steps.publish.outputs.dockerhub == 'true'
        id: meta_dockerhub
        uses: docker/metadata-action@v6.1.0 # v6
        with:
          images: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/oauth2-server
          tags: |
            type=raw,value=latest${{ matrix.tag_suffix }},enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,format=short,suffix=${{ matrix.tag_suffix }},enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=${{ env.IMAGE_VERSION }}${{ matrix.tag_suffix }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push image
        uses: docker/build-push-action@v7.2.0 # v7
        with:
          context: .
          push: true
          file: Dockerfile.prebuilt
          platforms: linux/amd64,linux/arm64
          build-args: |
            BINARY_SUFFIX=${{ matrix.binary_suffix }}
          tags: |
            ${{ steps.meta_ghcr.outputs.tags }}
            ${{ steps.meta_dockerhub.outputs.tags }}
          labels: ${{ steps.meta_ghcr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate multi-arch manifest (GHCR)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then
            tag="${{ env.IMAGE_VERSION }}${{ matrix.tag_suffix }}"
          else
            tag="latest${{ matrix.tag_suffix }}"
          fi

          image="ghcr.io/${{ github.repository_owner }}/oauth2-server:${tag}"
          bash .github/scripts/validate_multiarch_manifest.sh \
            "$image" \
            "/tmp/imagetools-${{ matrix.variant_name }}.txt"

      - name: Validate multi-arch manifest (Docker Hub)
        if: steps.publish.outputs.dockerhub == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then
            tag="${{ env.IMAGE_VERSION }}${{ matrix.tag_suffix }}"
          else
            tag="latest${{ matrix.tag_suffix }}"
          fi

          image="docker.io/${{ secrets.DOCKER_USERNAME }}/oauth2-server:${tag}"
          bash .github/scripts/validate_multiarch_manifest.sh \
            "$image" \
            "/tmp/imagetools-dockerhub-${{ matrix.variant_name }}.txt"

  # Documentation
  docs:
    name: Build and Deploy Documentation
    runs-on: ubuntu-latest
    needs: [checks]
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    timeout-minutes: 20
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7.0.0 # v6

      - name: Rust toolchain + cache
        uses: ./.github/actions/rust-setup
        with:
          toolchain: stable
          cache-key: docs
          install-system-deps: "true"

      - name: Build Rust Docs
        run: cargo doc --no-deps --all-features

      - name: Download compliance artifact (with real test results)
        # The `checks` job runs the compliance suite and uploads a fresh
        # docs/compliance/RFC_COMPLIANCE.md (status filled in from libtest
        # output). Pull it down here so the published docs always reflect
        # current pass/fail status. Falls back to the committed file if the
        # artifact is unavailable for any reason.
        uses: actions/download-artifact@v7.0.0 # v7
        continue-on-error: true
        with:
          name: rfc-compliance-report
          path: target/compliance-artifact

      - name: Apply compliance report to docs tree
        # If the artifact arrived, copy the fresh Markdown into docs/compliance/
        # before mkdocs build runs.
        run: |
          if [ -f target/compliance-artifact/docs/compliance/RFC_COMPLIANCE.md ]; then
            cp target/compliance-artifact/docs/compliance/RFC_COMPLIANCE.md \
               docs/compliance/RFC_COMPLIANCE.md
            echo "Applied freshly generated compliance matrix from checks job"
          else
            echo "No compliance artifact found; using committed RFC_COMPLIANCE.md"
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-docs.txt', 'mkdocs.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-docs.txt ]; then
            pip install -r requirements-docs.txt
          else
            # Fallback: minimal deps for mkdocs.yml (keep in sync with requirements-docs.txt)
            pip install mkdocs-material mkdocs-mermaid2-plugin
          fi

      - name: Build MkDocs
        run: |
          if [ -f mkdocs.yml ]; then
            mkdocs build
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Prepare docs for deployment
        run: |
          mkdir -p _site
          # Copy MkDocs site if it exists
          if [ -d "site" ]; then
            cp -r site/* _site/
          fi
          # Copy Rust docs to rustdoc subdirectory
          if [ -d "target/doc" ]; then
            mkdir -p _site/rustdoc
            cp -r target/doc/* _site/rustdoc/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  # Quality Gate
  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [changes, checks, security, build-binaries, db-tests, e2e-kind]
    if: always()
    steps:
      - name: Check Job Results
        shell: bash
        run: |
          set -euo pipefail
          # Skipped jobs are expected for docs-only changes — only a real
          # failure/cancellation of a critical job fails the gate.
          fail=0
          for pair in \
            "checks:${{ needs.checks.result }}" \
            "build-binaries:${{ needs.build-binaries.result }}" \
            "db-tests:${{ needs.db-tests.result }}" \
            "e2e-kind:${{ needs.e2e-kind.result }}"; do
            name="${pair%%:*}"; res="${pair#*:}"
            if [[ "$res" == "failure" || "$res" == "cancelled" ]]; then
              echo "::error::${name}: ${res}"
              fail=1
            else
              echo "${name}: ${res}"
            fi
          done

          # Security is informational in the gate (it is its own required check).
          sec='${{ needs.security.result }}'
          if [[ "$sec" != "success" && "$sec" != "skipped" ]]; then
            echo "⚠️  security: ${sec} (informational)"
          fi

          if [[ "$fail" -ne 0 ]]; then
            echo "Quality gate failed!"
            exit 1
          fi
          echo "Quality gate passed!"

      - name: Job summary (final)
        if: always()
        run: |
          {
            echo
            echo "Result: **${{ job.status }}**"
            echo "\nUpstream results:"
            echo "- checks: ${{ needs.checks.result }}"
            echo "- build-binaries: ${{ needs.build-binaries.result }}"
            echo "- security: ${{ needs.security.result }}"
            echo "- db-tests: ${{ needs.db-tests.result }}"
            echo "- e2e-kind: ${{ needs.e2e-kind.result }}"
          } >> "$GITHUB_STEP_SUMMARY"
