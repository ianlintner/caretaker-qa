name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install
        run: uv sync --extra dev
      - name: Ruff format
        run: uv run ruff format --check src tests
      - name: Ruff lint
        run: uv run ruff check src tests
      - name: Mypy
        run: uv run mypy src

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install
        run: uv sync --extra dev
      - name: Pytest + coverage
        run: uv run pytest --cov=qa_agent --cov-branch --cov-report=term-missing --cov-fail-under=80
