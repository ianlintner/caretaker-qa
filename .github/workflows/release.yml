name: Release (bump version + tag)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.1.2 or v0.1.2)"
        required: true
        type: string

# Least privilege by default. Each job widens only what it needs:
#   - prepare:        contents:write  (commit the bump + push the tag) — NO build
#   - build-binaries: contents:read   (compiles deps; holds NO registry secrets)
#   - publish:        packages:write  (pushes images; runs NO cargo build)
#
# This is the supply-chain split: dependency build scripts execute ONLY in
# build-binaries, which has a read-only token and no registry credentials, so a
# compromised crate's build.rs/proc-macro cannot exfiltrate the Docker token or
# tamper with the repo. The credentialed publish job only assembles images from
# already-built binaries via Dockerfile.prebuilt (no compilation).
permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    name: Bump version + tag
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      sha: ${{ steps.commit.outputs.sha }}
      sha_short: ${{ steps.commit.outputs.sha_short }}

    steps:
      # main is protected by a ruleset requiring the CI checks. The default
      # GITHUB_TOKEN (GitHub Actions bot) cannot bypass it on a personal repo,
      # so the bump commit + tag are pushed with an admin-owned fine-grained PAT
      # (RELEASE_TOKEN, contents: write) which bypasses via the admin role.
      - name: Require RELEASE_TOKEN
        shell: bash
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TOKEN}" ]; then
            echo "::error::RELEASE_TOKEN secret is required to push to the protected main branch. Create a fine-grained PAT with 'Contents: write' on this repo and add it as the RELEASE_TOKEN secret." >&2
            exit 1
          fi

      - name: Checkout default branch
        uses: actions/checkout@v6.0.3 # v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          # Use the PAT so the version-bump push + tag bypass branch protection.
          token: ${{ secrets.RELEASE_TOKEN }}
          persist-credentials: true

      - name: Rust toolchain + cache
        uses: ./.github/actions/rust-setup
        with:
          toolchain: stable
          cache-key: release-prepare
          install-system-deps: "true"

      - name: Normalize + validate version
        id: ver
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          input="$INPUT_VERSION"
          version="${input#v}"

          # Semver-ish: 1.2.3, optionally with -rc.1 or +build.7 etc.
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: '$input' (normalized: '$version')" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Fail if tag already exists
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ steps.ver.outputs.tag }}'
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag already exists: ${tag}" >&2
            exit 1
          fi

      - name: Bump root Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/bump_cargo_version.py --file Cargo.toml --version '${{ steps.ver.outputs.version }}'

      - name: Update Cargo.lock
        shell: bash
        run: |
          set -euo pipefail
          # Resolve-only (no compilation, no build scripts): keeps dependency
          # versions pinned while reflecting the new workspace package version.
          cargo generate-lockfile

      - name: Commit version bump to default branch
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No changes detected after bump; refusing to tag." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): bump version to ${{ steps.ver.outputs.version }}"

          # Retry the push to tolerate concurrent activity on the default
          # branch (e.g. Flux ImageUpdateAutomation pushes a kustomization
          # bump every ~5 min).
          branch="${{ github.event.repository.default_branch }}"
          for attempt in 1 2 3; do
            if git push origin "$branch"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to push release commit after 3 attempts." >&2
              exit 1
            fi
            echo "Push rejected; rebasing onto origin/$branch and retrying (attempt $((attempt + 1))/3)..." >&2
            git fetch origin "$branch"
            git rebase "origin/$branch"
          done

      - name: Capture release commit SHA
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ steps.ver.outputs.tag }}'
          git tag -a "$tag" -m "$tag"
          git push origin "$tag"

  build-binaries:
    name: Build release binaries (no secrets)
    runs-on: ubuntu-latest
    needs: [prepare]
    timeout-minutes: 90
    # Intentionally read-only and secret-free: this is the only job that
    # compiles dependencies (and therefore runs their build scripts/proc-macros).
    permissions:
      contents: read

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6.0.3 # v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Rust toolchain + cache
        uses: ./.github/actions/rust-setup
        with:
          toolchain: stable
          cache-key: release-build
          install-system-deps: "true"

      - name: Install cross (for arm64 builds)
        uses: taiki-e/install-action@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2.75.18
        with:
          tool: cross

      - name: Build release binaries (amd64 + arm64; all variants)
        shell: bash
        run: bash .github/scripts/build_release_binaries.sh --include-mongo-variants

      - name: Upload release binaries
        uses: actions/upload-artifact@v7.0.1 # v7
        with:
          name: release-binaries
          path: |
            target/release/rust_oauth2_server*-amd64
            target/release/rust_oauth2_server*-arm64
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish images (no compilation)
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries]
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6.0.3 # v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download release binaries
        uses: actions/download-artifact@v7.0.1 # v7
        with:
          name: release-binaries
          path: target/release

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Decide publishing targets
        id: targets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ secrets.DOCKER_USERNAME }}" && -n "${{ secrets.DOCKER_TOKEN }}" ]]; then
            echo "dockerhub=true" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v4.2.0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Docker Hub
        if: steps.targets.outputs.dockerhub == 'true'
        uses: docker/login-action@v4.2.0 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata (GHCR)
        id: meta_ghcr
        uses: docker/metadata-action@v6.1.0 # v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/oauth2-server
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ needs.prepare.outputs.sha_short }}
            type=raw,value=${{ env.IMAGE_VERSION }}

      - name: Extract metadata (GHCR, mongo)
        id: meta_ghcr_mongo
        uses: docker/metadata-action@v6.1.0 # v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/oauth2-server
          tags: |
            type=raw,value=latest-mongo
            type=raw,value=sha-${{ needs.prepare.outputs.sha_short }}-mongo
            type=raw,value=${{ env.IMAGE_VERSION }}-mongo

      - name: Extract metadata (GHCR, mongo-only)
        id: meta_ghcr_mongo_only
        uses: docker/metadata-action@v6.1.0 # v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/oauth2-server
          tags: |
            type=raw,value=latest-mongo-only
            type=raw,value=sha-${{ needs.prepare.outputs.sha_short }}-mongo-only
            type=raw,value=${{ env.IMAGE_VERSION }}-mongo-only

      - name: Extract metadata (Docker Hub)
        if: steps.targets.outputs.dockerhub == 'true'
        id: meta_dockerhub
        uses: docker/metadata-action@v6.1.0 # v6
        with:
          images: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/oauth2-server
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ needs.prepare.outputs.sha_short }}
            type=raw,value=${{ env.IMAGE_VERSION }}

      - name: Extract metadata (Docker Hub, mongo)
        if: steps.targets.outputs.dockerhub == 'true'
        id: meta_dockerhub_mongo
        uses: docker/metadata-action@v6.1.0 # v6
        with:
          images: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/oauth2-server
          tags: |
            type=raw,value=latest-mongo
            type=raw,value=sha-${{ needs.prepare.outputs.sha_short }}-mongo
            type=raw,value=${{ env.IMAGE_VERSION }}-mongo

      - name: Extract metadata (Docker Hub, mongo-only)
        if: steps.targets.outputs.dockerhub == 'true'
        id: meta_dockerhub_mongo_only
        uses: docker/metadata-action@v6.1.0 # v6
        with:
          images: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/oauth2-server
          tags: |
            type=raw,value=latest-mongo-only
            type=raw,value=sha-${{ needs.prepare.outputs.sha_short }}-mongo-only
            type=raw,value=${{ env.IMAGE_VERSION }}-mongo-only

      - name: Build and Push (base image)
        uses: docker/build-push-action@v7.2.0 # v7
        with:
          context: .
          push: true
          file: Dockerfile.prebuilt
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta_ghcr.outputs.tags }}
            ${{ steps.meta_dockerhub.outputs.tags }}
          labels: ${{ steps.meta_ghcr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push (mongo image)
        uses: docker/build-push-action@v7.2.0 # v7
        with:
          context: .
          push: true
          file: Dockerfile.prebuilt
          platforms: linux/amd64,linux/arm64
          build-args: |
            BINARY_SUFFIX=-mongo
          tags: |
            ${{ steps.meta_ghcr_mongo.outputs.tags }}
            ${{ steps.meta_dockerhub_mongo.outputs.tags }}
          labels: ${{ steps.meta_ghcr_mongo.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push (mongo-only image; no SQLx)
        uses: docker/build-push-action@v7.2.0 # v7
        with:
          context: .
          push: true
          file: Dockerfile.prebuilt
          platforms: linux/amd64,linux/arm64
          build-args: |
            BINARY_SUFFIX=-mongo-only
          tags: |
            ${{ steps.meta_ghcr_mongo_only.outputs.tags }}
            ${{ steps.meta_dockerhub_mongo_only.outputs.tags }}
          labels: ${{ steps.meta_ghcr_mongo_only.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Job summary
        run: |
          {
            echo "## Release created"
            echo
            echo "- Version: \`${{ needs.prepare.outputs.version }}\`"
            echo "- Tag: \`${{ needs.prepare.outputs.tag }}\`"
            echo "- Cargo.toml + Cargo.lock updated + committed to main, then tag pushed."
            echo "- Docker images published:"
            echo "  - GHCR: \`ghcr.io/${{ github.repository_owner }}/oauth2-server:${{ needs.prepare.outputs.version }}\`"
            echo "  - GHCR: \`ghcr.io/${{ github.repository_owner }}/oauth2-server:sha-${{ needs.prepare.outputs.sha_short }}\`"
            echo "  - GHCR: \`ghcr.io/${{ github.repository_owner }}/oauth2-server:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
