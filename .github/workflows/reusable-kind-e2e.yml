name: Reusable KIND E2E

on:
  workflow_call:
    inputs:
      job_name:
        description: Human-friendly job name.
        required: true
        type: string
      script_path:
        description: Repository-relative path to the E2E script to execute.
        required: true
        type: string
      use_prebuilt_binaries:
        description: Download amd64/arm64 artifacts from an earlier job instead of building locally.
        required: false
        default: false
        type: boolean
      timeout_minutes:
        description: Maximum runtime for the E2E job.
        required: false
        default: 35
        type: number
      enable_config_debug:
        description: Enable OAUTH2_DEBUG_CONFIG during the run.
        required: false
        default: false
        type: boolean
      image_ref:
        description: Docker image tag to load into KIND.
        required: false
        default: docker.io/ianlintner068/oauth2-server:test
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  kind-e2e:
    name: ${{ inputs.job_name }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    env:
      KUBECONFIG: ${{ github.workspace }}/.kubeconfig-kind-oauth2
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Rust toolchain + cache
        if: ${{ !inputs.use_prebuilt_binaries }}
        uses: ./.github/actions/rust-setup
        with:
          toolchain: stable
          cache-key: kind-e2e
          install-system-deps: "true"

      - name: Prepare local prebuilt release binary
        if: ${{ !inputs.use_prebuilt_binaries }}
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked
          test -f target/release/rust_oauth2_server
          cp target/release/rust_oauth2_server target/release/rust_oauth2_server-amd64

      - name: Download prebuilt server binary (amd64)
        if: inputs.use_prebuilt_binaries
        uses: actions/download-artifact@v6
        with:
          name: rust_oauth2_server-linux-amd64
          path: target/release

      - name: Download prebuilt server binary (arm64)
        if: inputs.use_prebuilt_binaries
        uses: actions/download-artifact@v6
        with:
          name: rust_oauth2_server-linux-arm64
          path: target/release

      - name: Ensure binaries are executable
        shell: bash
        run: |
          set -euo pipefail
          chmod +x target/release/rust_oauth2_server-amd64
          if [[ -f target/release/rust_oauth2_server-arm64 ]]; then
            chmod +x target/release/rust_oauth2_server-arm64
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install KIND
        shell: bash
        run: |
          set -euo pipefail
          KIND_VERSION="v0.24.0"
          curl -fsSL -o kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x kind
          sudo mv kind /usr/local/bin/kind
          kind version

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Install kustomize
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Enable config debug logging
        if: inputs.enable_config_debug
        shell: bash
        run: echo "OAUTH2_DEBUG_CONFIG=1" >> "$GITHUB_ENV"

      - name: Build Docker image from prebuilt binary
        timeout-minutes: 20
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prebuilt
          tags: ${{ inputs.image_ref }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run KIND E2E suite
        shell: bash
        run: |
          set -euo pipefail
          SKIP_IMAGE_BUILD=1 \
          KEEP_CLUSTER=1 \
          KEEP_NAMESPACE=1 \
          CLUSTER_NAME=oauth2-test \
          NAMESPACE=oauth2-server \
          IMAGE_REF='${{ inputs.image_ref }}' \
          bash '${{ inputs.script_path }}'

      - name: Export cluster logs
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if kind get clusters | grep -qx oauth2-test; then
            kind export logs ./kind-logs --name oauth2-test || true
          fi

          kubectl --kubeconfig "${KUBECONFIG}" --context kind-oauth2-test \
            get all -n oauth2-server -o wide > cluster-state.log || true
          kubectl --kubeconfig "${KUBECONFIG}" --context kind-oauth2-test \
            describe pods -n oauth2-server > pods-describe.log || true
          kubectl --kubeconfig "${KUBECONFIG}" --context kind-oauth2-test \
            logs deployment/oauth2-server -n oauth2-server --tail=200 > oauth2-server.log || true

          if kubectl --kubeconfig "${KUBECONFIG}" --context kind-oauth2-test \
            get deployment/resource-server -n oauth2-server >/dev/null 2>&1; then
            kubectl --kubeconfig "${KUBECONFIG}" --context kind-oauth2-test \
              logs deployment/resource-server -n oauth2-server --tail=200 > resource-server.log || true
          fi

      - name: Upload cluster logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: kind-cluster-logs-${{ github.run_id }}-${{ github.job }}
          path: |
            cluster-state.log
            kind-logs
            oauth2-server.log
            pods-describe.log
            resource-server.log
          retention-days: 7

      - name: Cleanup KIND resources
        if: always()
        shell: bash
        run: |
          kubectl --kubeconfig "${KUBECONFIG}" --context kind-oauth2-test delete namespace oauth2-server || true
          kind delete cluster --name oauth2-test || true
