name: Weekly Documentation Reconciliation

on:
  schedule:
    # Every Monday at 8:00 AM UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-and-create-issue:
    name: Check for weekly commits and create docs issue
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0

      - name: Check for commits in the past 7 days
        id: check_commits
        shell: bash
        run: |
          set -euo pipefail

          since_date="$(date -u -d '7 days ago' '+%Y-%m-%dT%H:%M:%SZ')"
          echo "Checking for commits since ${since_date} on main..."

          commit_count=$(git log --oneline --since="${since_date}" --format="%H" origin/main | wc -l)
          echo "commit_count=${commit_count}" >> "$GITHUB_OUTPUT"

          if [ "${commit_count}" -gt 0 ]; then
            echo "has_commits=true" >> "$GITHUB_OUTPUT"

            # Build a markdown-friendly commit summary (most recent 50)
            summary=$(git log -50 --since="${since_date}" --format="- [%h](https://github.com/${{ github.repository }}/commit/%H) %s (%an, %as)" origin/main)
            {
              echo "commit_summary<<COMMIT_EOF"
              echo "${summary}"
              echo "COMMIT_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
            echo "commit_summary=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create documentation reconciliation issue
        if: steps.check_commits.outputs.has_commits == 'true'
        id: create_issue
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          COMMIT_SUMMARY: ${{ steps.check_commits.outputs.commit_summary }}
          COMMIT_COUNT: ${{ steps.check_commits.outputs.commit_count }}
        with:
          script: |
            const commitCount = process.env.COMMIT_COUNT;
            const commitSummary = process.env.COMMIT_SUMMARY;
            const today = new Date().toISOString().split('T')[0];

            const body = [
              `## Weekly Documentation Reconciliation — ${today}`,
              '',
              `There have been **${commitCount} commit(s)** to \`main\` in the past 7 days.`,
              'Please review the changes below and reconcile the documentation to reflect',
              'the current application state, new features, and any API changes.',
              '',
              '### Commits This Week',
              '',
              commitSummary,
              '',
              '### Reconciliation Checklist',
              '',
              '- [ ] Review each commit for user-facing or API changes',
              '- [ ] Update `docs/` pages that are affected by the changes',
              '- [ ] Update `README.md` if top-level features or setup steps changed',
              '- [ ] Update `SUMMARY.md` if the canonical docs set changed',
              '- [ ] Verify the generated OpenAPI / Swagger surface is still described accurately',
              '- [ ] Check configuration reference (`application.conf.example`, `.env.example`)',
              '- [ ] Update architecture docs if structural changes were made (`docs/development/architecture.md`)',
              '- [ ] Ensure deployment docs are current (`docs/operations/deployment.md`, `k8s/`, `docker-compose*.yml`)',
              '- [ ] Run `python3 -m mkdocs build --strict` locally to verify the docs build cleanly',
              '- [ ] Open a PR with documentation updates',
              '',
              '### Notes',
              '',
              'This issue was automatically created by the **Weekly Documentation Reconciliation** workflow.',
              `See the [workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              '',
              '> [!TIP]',
              '> Preferred model: **Claude Opus**',
            ].join('\n');

            // Ensure the 'documentation' label exists before applying it
            const labels = [];
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'documentation',
              });
              labels.push('documentation');
            } catch {
              // Label doesn't exist; create it
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'documentation',
                  color: '0075ca',
                  description: 'Improvements or additions to documentation',
                });
                labels.push('documentation');
              } catch (createErr) {
                core.warning(`Could not create 'documentation' label: ${createErr.message}`);
              }
            }

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `docs: weekly documentation reconciliation (${today})`,
              body: body,
              labels: labels,
            });

            core.info(`Created issue #${issue.data.number}`);

            core.setOutput('issue_number', String(issue.data.number));
            core.setOutput(
              'default_branch',
              context.payload.repository?.default_branch || 'main'
            );

      - name: Assign Copilot cloud agent
        if: steps.create_issue.outputs.issue_number != ''
        id: assign_copilot
        env:
          COPILOT_ASSIGN_TOKEN: ${{ secrets['COPILOT_ASSIGN_TOKEN'] }}
          COPILOT_ASSIGN_MODEL: ${{ vars['COPILOT_ASSIGN_MODEL'] }}
          ISSUE_NUMBER: ${{ steps.create_issue.outputs.issue_number }}
          TARGET_REPO: ${{ github.repository }}
          BASE_BRANCH: ${{ steps.create_issue.outputs.default_branch }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${COPILOT_ASSIGN_TOKEN:-}" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "detail=Secret COPILOT_ASSIGN_TOKEN is not configured." >> "$GITHUB_OUTPUT"
            echo "::warning::Secret COPILOT_ASSIGN_TOKEN is not configured. Set a fine-grained PAT or GitHub App user-to-server token with metadata:read and actions/contents/issues/pull-requests:write to enable Copilot assignment."
            exit 0
          fi

          custom_instructions="Use the repository Copilot instructions and CI gate checklist. Focus on documentation reconciliation for the issue content and commit summary."

          if [ -n "${COPILOT_ASSIGN_MODEL:-}" ]; then
            payload=$(jq -n \
              --arg assignee "copilot-swe-agent[bot]" \
              --arg target_repo "$TARGET_REPO" \
              --arg base_branch "$BASE_BRANCH" \
              --arg custom_instructions "$custom_instructions" \
              --arg model "$COPILOT_ASSIGN_MODEL" \
              '{
                assignees: [$assignee],
                agent_assignment: {
                  target_repo: $target_repo,
                  base_branch: $base_branch,
                  custom_instructions: $custom_instructions,
                  model: $model
                }
              }')
          else
            payload=$(jq -n \
              --arg assignee "copilot-swe-agent[bot]" \
              --arg target_repo "$TARGET_REPO" \
              --arg base_branch "$BASE_BRANCH" \
              --arg custom_instructions "$custom_instructions" \
              '{
                assignees: [$assignee],
                agent_assignment: {
                  target_repo: $target_repo,
                  base_branch: $base_branch,
                  custom_instructions: $custom_instructions
                }
              }')
          fi

          response_file="$(mktemp)"
          status_code=$(curl -sS -o "$response_file" -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${COPILOT_ASSIGN_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${TARGET_REPO}/issues/${ISSUE_NUMBER}/assignees" \
            --data "$payload")

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            response_compact=$(jq -c . "$response_file" 2>/dev/null || cat "$response_file")
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "detail=HTTP ${status_code}: ${response_compact}" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not assign Copilot cloud agent (HTTP ${status_code}): ${response_compact}"
            exit 0
          fi

          assigned_logins=$(jq -r '.assignees[]?.login' "$response_file" | paste -sd ', ' -)
          echo "status=assigned" >> "$GITHUB_OUTPUT"
          echo "detail=${assigned_logins:-copilot-swe-agent[bot]}" >> "$GITHUB_OUTPUT"
          echo "Assigned Copilot cloud agent to issue #${ISSUE_NUMBER}."

      - name: Job summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Weekly Documentation Reconciliation"
            echo
            if [ "${{ steps.check_commits.outputs.has_commits }}" = "true" ]; then
              echo "- **Commits found**: ${{ steps.check_commits.outputs.commit_count }}"
              echo "- **Issue created**: ✅"
              case "${{ steps.assign_copilot.outputs.status }}" in
                assigned)
                  echo "- **Copilot assignment**: ✅ ${{ steps.assign_copilot.outputs.detail }}"
                  ;;
                skipped)
                  echo "- **Copilot assignment**: ⚠️ skipped — ${{ steps.assign_copilot.outputs.detail }}"
                  ;;
                failed)
                  echo "- **Copilot assignment**: ⚠️ failed — ${{ steps.assign_copilot.outputs.detail }}"
                  ;;
                *)
                  echo "- **Copilot assignment**: not attempted"
                  ;;
              esac
            else
              echo "- No commits found in the past 7 days."
              echo "- **Issue created**: ❌ (skipped)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
