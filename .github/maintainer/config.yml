version: v1

# caretaker-qa is itself a QA surface for caretaker. Keep advanced features
# ON where defaults allow, but gate destructive actions behind labels.

orchestrator:
  schedule: daily
  summary_issue: true
  dry_run: false

llm:
  claude_enabled: auto
  claude_features:
    - ci_log_analysis
    - architectural_review

executor:
  provider: auto
  foundry:
    enabled: true
    model: azure_ai/gpt-5.4
    allowed_task_types:
      - LINT_FAILURE
      - REVIEW_COMMENT
    route_same_repo_only: true

triage:
  enabled: true
  pr_triage: true
  issue_triage: true
  cascade: true
  dry_run: false

# Wave A3 — deterministic-first fix ladder lives under self_heal_agent.
self_heal_agent:
  enabled: true
  report_upstream: true
  fix_ladder:
    enabled: true

# Wave A5 guardrails default on — nothing to override.

agentic:
  # Shadow-mode on the usual suspects; promote to enforce once the
  # nightly-eval clears the gate.
  readiness:
    mode: shadow
  ci_triage:
    mode: shadow
  issue_triage:
    mode: shadow
  dispatch_guard:
    mode: shadow

stale_agent:
  enabled: true
  stale_days: 30
  close_after: 14

escalation:
  targets: []
  stale_days: 7
  labels: ["maintainer:escalated"]

fleet:
  include_global_in_prompts: true
  alerts:
    enabled: false

memory_store:
  retrieval_enabled: true

dependency_agent:
  bisector:
    enabled: false
