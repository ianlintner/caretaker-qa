version: v1

# caretaker-qa is itself a QA surface for caretaker. Keep advanced features
# ON where defaults allow, but gate destructive actions behind labels.

orchestrator:
  schedule: daily
  summary_issue: true
  dry_run: false

# ── Fleet Registry ────────────────────────────────────────────────────────────
# Register this repo with the caretaker admin dashboard. When enabled, the
# orchestrator POSTs a heartbeat to the central registry after every run so
# the fleet page at https://caretaker.cat-herding.net shows live status.
#
# Requirements:
#   1. Set CARETAKER_FLEET_SECRET as a GitHub Actions secret in this repo.
#   2. Ensure your workflow exports CARETAKER_FLEET_SECRET (v0.19.6+ templates
#      do this automatically; older installs need a one-line workflow edit).
fleet_registry:
  enabled: false
  endpoint: https://caretaker.cat-herding.net/api/fleet/heartbeat
  oauth2:
    enabled: true
    client_id_env: OAUTH2_CLIENT_ID
    client_secret_env: OAUTH2_CLIENT_SECRET
    token_url_env: OAUTH2_TOKEN_URL
    scope_env: OAUTH2_SCOPE
    default_scope: "fleet:heartbeat"
    timeout_seconds: 10.0
  timeout_seconds: 5.0
  include_full_summary: false

llm:
  # Azure AI via LiteLLM — no direct Anthropic SDK key.
  # - provider: litellm  → routes azure_ai/* models through LiteLLM
  # - claude_enabled: auto  → LLMRouter consults ClaudeClient.available,
  #   which returns True when any provider key (incl. AZURE_AI_API_KEY) is
  #   set. "false" here would short-circuit the router and disable all
  #   feature-model LLM calls, including the pr_reviewer inline review path.
  provider: litellm
  claude_enabled: auto
  default_model: azure_ai/gpt-5.4
  # QA scenario 11 — pin ci_log_analysis to azure_ai/claude-sonnet-4 to
  # exercise _supports_prompt_cache (src/caretaker/llm/provider.py:45) and
  # prove Anthropic prompt caching still works when Claude is routed through
  # Azure AI Foundry. Reverting: remove this block or set model: null.
  feature_models:
    ci_log_analysis:
      model: azure_ai/claude-sonnet-4
      max_tokens: 1500

executor:
  provider: auto
  foundry:
    enabled: true
    model: azure_ai/gpt-5.4
    allowed_task_types:
      - LINT_FAILURE
      - REVIEW_COMMENT
    route_same_repo_only: true

triage:
  enabled: true
  pr_triage: true
  issue_triage: true
  cascade: true
  dry_run: false

# Wave A3 — deterministic-first fix ladder lives under self_heal_agent.
self_heal_agent:
  enabled: true
  report_upstream: true
  fix_ladder:
    enabled: true

# Wave A5 guardrails default on — nothing to override.

# Dual-path PR code reviewer. Defaults are fine for production; we
# opt-in to polling here so already-ready PRs get reviewed on the
# next scheduled or dispatched run, not only on webhook events.
pr_reviewer:
  enabled: true
  webhook_only: false
  trigger_actions:
    - opened
    - ready_for_review
    - reopened
    - synchronize
  skip_draft: true
  post_inline_comments: true
  # Allow re-review after auto-fix pushes a new commit. Without skip_labels:[],
  # the caretaker:reviewed label (applied after each review) would block the
  # fresh review that validates the fix — breaking the review→auto-fix loop.
  skip_labels: []
  # Route complex / fall-through reviews to the in-pod opencode_local
  # backend (caretaker MCP pod has the opencode CLI + OPENROUTER_API_KEY
  # baked in). The legacy default 'opencode' is a comment-trigger that
  # requires the sst/opencode-github-action App to be installed in this
  # repo — it isn't — so handoffs would otherwise sit forever.
  complex_reviewer: opencode_local
  # opencode_local must be in the enabled list for non-caretaker-owned
  # PRs to use it; without this the agent falls back to the first
  # backend in this list. (caretaker-owned PRs always allow it via
  # caretaker_owned_reviewer.)
  enabled_backends:
    - claude_code
    - opencode
    - opencode_local
    - pr_agent

# Auto-approve workflow runs from trusted bot actors that are gated by
# GitHub's first-time-contributor owner-approval gate. Without this,
# every Copilot/dependabot revision push requires manual owner approval
# before CI can run, blocking the automated review+fix loop entirely.
# allowed_actors defaults cover: Copilot, copilot-swe-agent[bot],
# github-actions[bot], dependabot[bot], the-care-taker[bot].
pr_ci_approver:
  enabled: true
  auto_approve: true

# Security-agent probes: caretaker-qa has no Dependabot security updates,
# no code scanning alerts, and no PAT that can read secret-scanning alerts
# (the default GITHUB_TOKEN cannot access /secret-scanning/alerts on public
# repos regardless of the security-events: read scope). Disable to silence
# the 403 scope-gap noise. Re-enable per-feature when a PAT is added.
security_agent:
  enabled: true
  include_dependabot: false
  include_code_scanning: false
  include_secret_scanning: false

# Enable the caretaker/pr-readiness check-run (QA scenario 20).
# readiness is nested under pr_agent (not top-level in MaintainerConfig).
# advisory mode (default merge_authority) → blocked PRs publish "neutral",
# never "failure", so the check is informational only.
pr_agent:
  readiness:
    enabled: true

agentic:
  # Shadow-mode on the usual suspects; promote to enforce once the
  # nightly-eval clears the gate.
  readiness:
    mode: shadow
  ci_triage:
    mode: shadow
  issue_triage:
    mode: shadow

stale_agent:
  enabled: true
  stale_days: 30
  close_after: 14

escalation:
  targets: []
  stale_days: 7
  labels: ["maintainer:escalated"]

fleet:
  include_global_in_prompts: true
  alerts:
    enabled: false

memory_store:
  retrieval_enabled: true

dependency_agent:
  bisector:
    enabled: false


# ── openclaw integration (v0.29.4) ───────────────────────────────────────────
# Route caretaker-owned PR reviews through the in-cluster openclaw litellm
# proxy. Also enabled as the pre-escalation agent so openclaw gets one shot
# before human escalation when the primary fix loop exhausts its retries.
pr_reviewer:
  caretaker_owned_reviewer: "openclaw_http"
  openclaw_http:
    enabled: true
    base_url: "http://openclaw.bot.svc.cluster.local:4000"
    api_key: "litellm-local-proxy"
    model: "my-router"
    timeout_seconds: 300
  auto_fix:
    pre_escalation_agent: "openclaw_http"
discord:
  enabled: true
  channel_id: "1504316939089084506"
  bot_token_env: CARETAKER_DISCORD_BOT_TOKEN
  github_verbosity: summary
  github_comment_max_chars: 1200
