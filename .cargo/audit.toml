# Configuration for cargo-audit
#
# cargo-audit reads configuration from `.cargo/audit.toml`.
# See: https://github.com/RustSec/rustsec/tree/main/cargo-audit#configuration

[advisories]
# Ignore specific vulnerabilities that cannot be fixed, or are not applicable to this project.
#
# Note: This server supports optional backends/features (e.g. `--features mongo`).
# Some advisories are only reachable through those optional dependencies.
ignore = [
  # RUSTSEC-2023-0071: RSA timing attack vulnerability
  # Status: No fix available
  # Reason: Transitive dependency via sqlx-mysql. This project does not enable MySQL support.
  #         (sqlx-mysql is pulled in by sqlx macros internals.)
  "RUSTSEC-2023-0071",

  # RUSTSEC-2024-0421: `idna` accepts Punycode labels that do not produce any non-ASCII when decoded
  # Status: Fix requires upgrading transitive dependency chain.
  # Reason: Only pulled in via the optional `mongo` feature (mongodb -> trust-dns-* -> idna 0.2.x).
  #         The default build does not include MongoDB.
  "RUSTSEC-2024-0421",

  # RUSTSEC-2026-0119: CPU exhaustion in hickory-proto during message encoding
  # Affected path: hickory-proto 0.25.2 ← mongodb 3.6.0 (with dns-resolver feature)
  # Fix available in hickory-proto 0.26.1, but mongodb 3.6.0 constrains to 0.25.x
  # Waiting for mongodb 3.7+ or alternate solution. Limited impact: DNS encoding
  # only triggered by mongodb driver's internal DNS resolution, not user input.
  # Review date: 2026-05-04
  # Next review: Remove once mongodb updates to hickory-proto 0.26+
  "RUSTSEC-2026-0119",

  # RUSTSEC-2026-0118: NSEC3 validation loop in hickory-proto
  # Affected path: hickory-proto 0.25.2 ← mongodb 3.6.0 (with dns-resolver feature)
  # No fix available yet (advisory issued 2026-05-01). Limited impact: DNSSEC
  # validation only affects NSEC3 records, not typical mongodb usage scenarios.
  # Review date: 2026-05-04
  # Next review: Remove once hickory-proto ships a fix and mongodb updates
  "RUSTSEC-2026-0118",

  # RUSTSEC-2021-0153: `encoding` crate is unmaintained
  # Affected path: encoding 0.2.33 ← java-properties ← hocon ← oauth2-config
  # Status: Crate is unmaintained since 2021
  # Reason: Transitive dependency through hocon config library. The encoding crate
  #         is only used by java-properties for Java .properties file parsing.
  #         Limited impact: not directly processing user input with this crate.
  # Review date: 2026-05-04
  # Next review: Consider replacing hocon or submitting PR to hocon to remove encoding dep
  "RUSTSEC-2021-0153",

  # RUSTSEC-2024-0384: `instant` crate is unmaintained
  # Affected path: instant 0.1.13 ← fastrand 1.9.0 ← futures-lite 1.13.0 ← async-io 1.13.0
  #                ← async-reactor-trait ← lapin ← oauth2-events
  # Status: Crate is unmaintained since Sept 2024
  # Reason: Transitive dependency through lapin (RabbitMQ client). Only used when
  #         events-rabbit feature is enabled (optional). Deep in dependency tree.
  # Review date: 2026-05-04
  # Next review: Monitor lapin for updates to newer async-io that doesn't depend on instant
  "RUSTSEC-2024-0384",

  # RUSTSEC-2025-0134: `rustls-pemfile` crate is unmaintained
  # Affected path: rustls-pemfile 2.2.0 ← tcp-stream ← amq-protocol-tcp ← amq-protocol
  #                ← lapin ← oauth2-events
  # Status: Crate is unmaintained since Nov 2025
  # Reason: Transitive dependency through lapin (RabbitMQ client). Only used when
  #         events-rabbit feature is enabled (optional).
  # Review date: 2026-05-04
  # Next review: Monitor lapin for updates or migration to rustls-pemfile successor
  "RUSTSEC-2025-0134",
]
