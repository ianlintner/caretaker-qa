<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OAuth2 Server - My Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-4">
    <div class="max-w-2xl mx-auto pt-10">
      <!-- Header -->
      <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-3">
          <div
            class="inline-flex items-center justify-center w-12 h-12 bg-indigo-600 rounded-full"
          >
            <svg
              class="w-6 h-6 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
              ></path>
            </svg>
          </div>
          <h1 class="text-2xl font-bold text-gray-900">My Profile</h1>
        </div>
        <form action="/auth/logout" method="POST">
          <button
            type="submit"
            class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
              ></path>
            </svg>
            Sign Out
          </button>
        </form>
      </div>

      <!-- Account Info Card -->
      <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
        <h2
          class="text-lg font-semibold text-gray-900 mb-6 flex items-center gap-2"
        >
          <svg
            class="w-5 h-5 text-indigo-600"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"
            ></path>
          </svg>
          Account Information
        </h2>
        <div class="space-y-4">
          <div
            class="flex items-center justify-between py-3 border-b border-gray-100"
          >
            <span class="text-sm font-medium text-gray-500">Username</span>
            <span class="text-sm font-semibold text-gray-900"
              >{{USERNAME}}</span
            >
          </div>
          <div
            class="flex items-center justify-between py-3 border-b border-gray-100"
          >
            <span class="text-sm font-medium text-gray-500">Email</span>
            <span class="text-sm font-semibold text-gray-900">{{EMAIL}}</span>
          </div>
          <div
            class="flex items-center justify-between py-3 border-b border-gray-100"
          >
            <span class="text-sm font-medium text-gray-500">Role</span>
            <span
              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium {{ROLE_CLASS}}"
            >
              {{ROLE}}
            </span>
          </div>
          <div class="flex items-center justify-between py-3">
            <span class="text-sm font-medium text-gray-500">User ID</span>
            <span class="text-xs font-mono text-gray-600">{{USER_ID}}</span>
          </div>
        </div>
      </div>

      <!-- Social Login Info (only shown when present) -->
      {{SOCIAL_SECTION}}

      <!-- Quick Links -->
      <div class="bg-white rounded-2xl shadow-xl p-8">
        <h2
          class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2"
        >
          <svg
            class="w-5 h-5 text-indigo-600"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"
            ></path>
          </svg>
          Quick Links
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          {{ADMIN_LINK}}
          <a
            href="/.well-known/openid-configuration"
            class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 hover:bg-gray-50 transition-colors"
          >
            <div
              class="flex items-center justify-center w-8 h-8 bg-green-100 rounded-lg"
            >
              <svg
                class="w-4 h-4 text-green-600"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
                ></path>
              </svg>
            </div>
            <span class="text-sm font-medium text-gray-700"
              >OIDC Discovery</span
            >
          </a>
        </div>
      </div>

      <p class="text-center text-xs text-gray-400 mt-8">
        OAuth2 Server &middot; Authenticated Session
      </p>
    </div>
  </body>
</html>
