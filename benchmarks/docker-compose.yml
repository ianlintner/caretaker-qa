##############################################################################
# OAuth2 Server Load Test Comparison — Docker Compose
#
# Each server is configured with identical resource limits (2 CPU, 512MB RAM)
# and uses the same PostgreSQL instance (separate databases).
#
# Usage: controlled via run-benchmarks.sh — do not start all services at once.
##############################################################################

services:
  # ──────────────────────────────────────────────────────────────────────────
  # Shared PostgreSQL 16 — one instance, separate databases per server
  # ──────────────────────────────────────────────────────────────────────────
  bench-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./setup/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - bench-pgdata:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1024M
    networks:
      - benchnet

  # ──────────────────────────────────────────────────────────────────────────
  # 1. Rust OAuth2 Server (this project)
  # ──────────────────────────────────────────────────────────────────────────
  bench-rust:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      OAUTH2_SERVER_HOST: "0.0.0.0"
      OAUTH2_SERVER_PORT: "8080"
      OAUTH2_DATABASE_URL: "postgresql://postgres:postgres@bench-postgres:5432/oauth2_rust"
      OAUTH2_JWT_SECRET: "${BENCHMARK_OAUTH2_JWT_SECRET:-test-jwt-secret-for-ci-only-do-not-use-in-production-32chars}"
      OAUTH2_SESSION_KEY: "${BENCHMARK_OAUTH2_SESSION_KEY:-000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f202122232425262728292a2b2c2d2e2f303132333435363738393a3b3c3d3e3f}"
      OAUTH2_SEED_PASSWORD: "BenchP@ssw0rd!Secure123"
      OAUTH2_ALLOW_INSECURE_DEFAULTS: "0"
      RUST_LOG: "warn"
      OAUTH2_EVENTS_ENABLED: "false"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
    depends_on:
      bench-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 3s
      timeout: 5s
      retries: 30
    networks:
      - benchnet

  # ──────────────────────────────────────────────────────────────────────────
  # 1b. Rust OAuth2 Server (MongoDB backend)
  # ──────────────────────────────────────────────────────────────────────────
  bench-mongo:
    image: mongo:7
    command: ["--bind_ip_all"]
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "localhost/admin",
          "--eval",
          "db.runCommand({ ping: 1 }).ok",
        ]
      interval: 3s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - benchnet

  bench-rust-mongo:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        CARGO_FEATURES: "mongo"
    environment:
      OAUTH2_SERVER_HOST: "0.0.0.0"
      OAUTH2_SERVER_PORT: "8080"
      OAUTH2_DATABASE_URL: "mongodb://bench-mongo:27017/oauth2_bench"
      OAUTH2_JWT_SECRET: "${BENCHMARK_OAUTH2_JWT_SECRET:-test-jwt-secret-for-ci-only-do-not-use-in-production-32chars}"
      OAUTH2_SESSION_KEY: "${BENCHMARK_OAUTH2_SESSION_KEY:-000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f202122232425262728292a2b2c2d2e2f303132333435363738393a3b3c3d3e3f}"
      OAUTH2_SEED_PASSWORD: "BenchP@ssw0rd!Secure123"
      OAUTH2_ALLOW_INSECURE_DEFAULTS: "0"
      RUST_LOG: "warn"
      OAUTH2_EVENTS_ENABLED: "false"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
    depends_on:
      bench-mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 3s
      timeout: 5s
      retries: 30
    networks:
      - benchnet

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Keycloak 24 (Java)
  # ──────────────────────────────────────────────────────────────────────────
  bench-keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://bench-postgres:5432/oauth2_keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: WARN
      KC_HTTP_PORT: "8080"
    volumes:
      - ./setup/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1024M
    depends_on:
      bench-postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && timeout 2 cat <&3 | grep -q '200\\|UP'",
        ]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 60s
    networks:
      - benchnet

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Ory Hydra 2.2 (Go)
  # ──────────────────────────────────────────────────────────────────────────
  bench-hydra-migrate:
    image: oryd/hydra:v2.2
    command: migrate sql -e --yes --config /etc/hydra/hydra.yml
    volumes:
      - ./setup/hydra/hydra.yml:/etc/hydra/hydra.yml:ro
    depends_on:
      bench-postgres:
        condition: service_healthy
    networks:
      - benchnet

  bench-hydra:
    image: oryd/hydra:v2.2
    command: serve all --dev --config /etc/hydra/hydra.yml
    volumes:
      - ./setup/hydra/hydra.yml:/etc/hydra/hydra.yml:ro
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
    depends_on:
      bench-hydra-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4444/health/ready",
        ]
      interval: 3s
      timeout: 5s
      retries: 30
    networks:
      - benchnet

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Authentik 2024.2 (Python)
  # ──────────────────────────────────────────────────────────────────────────
  bench-authentik-redis:
    image: redis:7-alpine
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
    networks:
      - benchnet

  bench-authentik-worker:
    image: ghcr.io/goauthentik/server:2024.2
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: "benchmarksecretkey1234567890abcdef1234567890"
      AUTHENTIK_POSTGRESQL__HOST: bench-postgres
      AUTHENTIK_POSTGRESQL__PORT: "5432"
      AUTHENTIK_POSTGRESQL__USER: postgres
      AUTHENTIK_POSTGRESQL__PASSWORD: postgres
      AUTHENTIK_POSTGRESQL__NAME: oauth2_authentik
      AUTHENTIK_REDIS__HOST: bench-authentik-redis
      AUTHENTIK_LOG_LEVEL: warning
      AUTHENTIK_BOOTSTRAP_PASSWORD: "BenchP@ssw0rd!Secure123"
      AUTHENTIK_BOOTSTRAP_TOKEN: "bench-bootstrap-token-12345678"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    depends_on:
      bench-postgres:
        condition: service_healthy
      bench-authentik-redis:
        condition: service_healthy
    networks:
      - benchnet

  bench-authentik:
    image: ghcr.io/goauthentik/server:2024.2
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: "benchmarksecretkey1234567890abcdef1234567890"
      AUTHENTIK_POSTGRESQL__HOST: bench-postgres
      AUTHENTIK_POSTGRESQL__PORT: "5432"
      AUTHENTIK_POSTGRESQL__USER: postgres
      AUTHENTIK_POSTGRESQL__PASSWORD: postgres
      AUTHENTIK_POSTGRESQL__NAME: oauth2_authentik
      AUTHENTIK_REDIS__HOST: bench-authentik-redis
      AUTHENTIK_LOG_LEVEL: warning
      AUTHENTIK_BOOTSTRAP_PASSWORD: "BenchP@ssw0rd!Secure123"
      AUTHENTIK_BOOTSTRAP_TOKEN: "bench-bootstrap-token-12345678"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
    depends_on:
      bench-postgres:
        condition: service_healthy
      bench-authentik-redis:
        condition: service_healthy
      bench-authentik-worker:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 30s
    networks:
      - benchnet

  # ──────────────────────────────────────────────────────────────────────────
  # 5. node-oidc-provider (Node.js)
  # ──────────────────────────────────────────────────────────────────────────
  bench-node-oidc:
    build:
      context: ./setup/node-oidc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgres://postgres:postgres@bench-postgres:5432/oauth2_node_oidc"
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
    depends_on:
      bench-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 3s
      timeout: 5s
      retries: 30
    networks:
      - benchnet

  # ──────────────────────────────────────────────────────────────────────────
  # k6 load testing tool
  # ──────────────────────────────────────────────────────────────────────────
  bench-k6:
    image: grafana/k6:0.50.0
    volumes:
      - ./k6:/scripts:ro
      - ./results:/results
    environment:
      K6_OUT: json=/results/raw.json
    networks:
      - benchnet
    profiles:
      - test

volumes:
  bench-pgdata:

networks:
  benchnet:
    driver: bridge
