site_name: Rust OAuth2 Server
site_description: Self-hosted OAuth2 and OIDC server with admin tooling, observability, and deployment guides.
site_author: Ian Lintner
repo_url: https://github.com/ianlintner/rust-oauth2-server
repo_name: ianlintner/rust-oauth2-server

theme:
    name: material
    icon:
        repo: fontawesome/brands/github
    features:
        - navigation.tabs
        - navigation.sections
        - navigation.top
        - search.suggest
        - search.highlight
        - content.code.copy
        - toc.follow
    palette:
        - media: "(prefers-color-scheme: light)"
            scheme: default
            primary: deep orange
            accent: blue
            toggle:
                icon: material/weather-night
                name: Switch to dark mode
        - media: "(prefers-color-scheme: dark)"
            scheme: slate
            primary: deep orange
            accent: blue
            toggle:
                icon: material/weather-sunny
                name: Switch to light mode

extra_css:
    - assets/stylesheets/extra.css

plugins:
    - search

markdown_extensions:
    - pymdownx.highlight:
            anchor_linenums: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - pymdownx.tasklist:
            custom_checkbox: true
    - admonition
    - pymdownx.details
    - toc:
            permalink: true
    - attr_list
    - md_in_html

nav:
    - Home: index.md
    - Get started:
            - Quickstart: getting-started/quickstart.md
            - Configuration: getting-started/configuration.md
    - Use the server:
            - OAuth & OIDC: usage/oauth2-oidc.md
            - Admin & API: usage/admin-api.md
            - Integrations: usage/integrations.md
    - Deploy & operate:
            - Deployment: operations/deployment.md
            - Observability: operations/observability.md
            - Runbooks: operations/runbooks.md
    - Extend & contribute:
            - Architecture: development/architecture.md
            - Extending: development/extending.md
            - Testing: development/testing.md
            - Contributing: development/contributing.md
