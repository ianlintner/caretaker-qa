apiVersion: v1
kind: Secret
metadata:
  name: oauth2-server-secret
stringData:
  OAUTH2_JWT_SECRET: "dev123"
  OAUTH2_SEED_PASSWORD: "changeme"
  # The base deployment maps MONGODB_CONNECTION_STRING -> OAUTH2_DATABASE_URL.
  # Override here to route the server to SQLite; the release binary is built
  # without the `mongo` feature so a mongodb:// URL causes a startup panic.
  MONGODB_CONNECTION_STRING: "sqlite:/tmp/oauth2-security-scan.db?mode=rwc"
