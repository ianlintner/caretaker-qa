apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-server
spec:
  template:
    spec:
      containers:
        - name: oauth2-server
          env:
            - name: OAUTH2_ALLOW_INSECURE_DEFAULTS
              value: "1"
            - name: OAUTH2_PUBLIC_INTROSPECTION
              value: "1"
            - name: OAUTH2_ALLOWED_ORIGINS
              value: "http://localhost:3000"
