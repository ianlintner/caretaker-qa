apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../k8s/base

images:
  - name: docker.io/ianlintner068/oauth2-server
    newTag: test

patches:
  - path: patches/delete-ingress.yaml
  - path: patches/delete-hpa.yaml
  - path: patches/delete-postgres-pvc.yaml
  - path: patches/secret-cors.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: oauth2-server
    path: patches/deployment-replicas.json
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: oauth2-server
    path: patches/deployment-cors.yaml
  - target:
      group: apps
      version: v1
      kind: StatefulSet
      name: postgres
    path: patches/postgres-ephemeral.json
