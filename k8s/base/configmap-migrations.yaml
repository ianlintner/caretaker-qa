apiVersion: v1
kind: ConfigMap
metadata:
  name: flyway-migrations
data:
  V1__create_clients_table.sql: |
    -- Create clients table
    CREATE TABLE IF NOT EXISTS clients (
        id TEXT PRIMARY KEY,
        client_id TEXT NOT NULL UNIQUE,
        client_secret TEXT NOT NULL,
        redirect_uris TEXT NOT NULL,
        grant_types TEXT NOT NULL,
        scope TEXT NOT NULL,
        name TEXT NOT NULL,
        created_at TIMESTAMPTZ NOT NULL,
        updated_at TIMESTAMPTZ NOT NULL
    );

    CREATE INDEX IF NOT EXISTS idx_clients_client_id ON clients(client_id);

  V2__create_users_table.sql: |
    -- Create users table
    CREATE TABLE IF NOT EXISTS users (
        id TEXT PRIMARY KEY,
        username TEXT NOT NULL UNIQUE,
        password_hash TEXT NOT NULL,
        email TEXT NOT NULL,
        enabled BOOLEAN NOT NULL DEFAULT TRUE,
        created_at TIMESTAMPTZ NOT NULL,
        updated_at TIMESTAMPTZ NOT NULL
    );

    CREATE INDEX IF NOT EXISTS idx_users_username ON users(username);
    CREATE INDEX IF NOT EXISTS idx_users_email ON users(email);

  V3__create_tokens_table.sql: |
    -- Create tokens table
    CREATE TABLE IF NOT EXISTS tokens (
        id TEXT PRIMARY KEY,
        access_token TEXT NOT NULL UNIQUE,
        refresh_token TEXT,
        token_type TEXT NOT NULL,
        expires_in INTEGER NOT NULL,
        scope TEXT NOT NULL,
        client_id TEXT NOT NULL,
        user_id TEXT NOT NULL,
        created_at TIMESTAMPTZ NOT NULL,
        expires_at TIMESTAMPTZ NOT NULL,
        revoked BOOLEAN NOT NULL DEFAULT FALSE,
        FOREIGN KEY (client_id) REFERENCES clients(client_id),
        FOREIGN KEY (user_id) REFERENCES users(id)
    );

    CREATE INDEX IF NOT EXISTS idx_tokens_access_token ON tokens(access_token);
    CREATE INDEX IF NOT EXISTS idx_tokens_refresh_token ON tokens(refresh_token);
    CREATE INDEX IF NOT EXISTS idx_tokens_client_id ON tokens(client_id);
    CREATE INDEX IF NOT EXISTS idx_tokens_user_id ON tokens(user_id);

  V4__create_authorization_codes_table.sql: |
    -- Create authorization_codes table
    CREATE TABLE IF NOT EXISTS authorization_codes (
        id TEXT PRIMARY KEY,
        code TEXT NOT NULL UNIQUE,
        client_id TEXT NOT NULL,
        user_id TEXT NOT NULL,
        redirect_uri TEXT NOT NULL,
        scope TEXT NOT NULL,
        created_at TIMESTAMPTZ NOT NULL,
        expires_at TIMESTAMPTZ NOT NULL,
        used BOOLEAN NOT NULL DEFAULT FALSE,
        code_challenge TEXT,
        code_challenge_method TEXT,
        FOREIGN KEY (client_id) REFERENCES clients(client_id),
        FOREIGN KEY (user_id) REFERENCES users(id)
    );

    CREATE INDEX IF NOT EXISTS idx_authorization_codes_code ON authorization_codes(code);
    CREATE INDEX IF NOT EXISTS idx_authorization_codes_client_id ON authorization_codes(client_id);
    CREATE INDEX IF NOT EXISTS idx_authorization_codes_user_id ON authorization_codes(user_id);

  V5__insert_default_data.sql: |
    -- Insert default data for LOCAL DEVELOPMENT AND TESTING ONLY.
    --
    -- SECURITY WARNING: Production deployments MUST skip this migration
    -- (configure Flyway with `-target=V4`)
    -- OR rotate the default client secret and disable/delete the seed
    -- user post-deploy.
    --
    -- Wave 2 hardening (2026-04-17):
    --   - Removed the `password` grant type from default grant_types.
    --   - Removed `admin` from the default scope.

    INSERT INTO clients (id, client_id, client_secret, redirect_uris, grant_types, scope, name, created_at, updated_at)
    VALUES (
        'default-client-id',
        'default_client',
        -- Generate a secure secret before production: openssl rand -hex 32
        'INSECURE_DEFAULT_SECRET_REGENERATE_FOR_PRODUCTION',
        '["http://localhost:3000/callback"]',
        '["authorization_code", "client_credentials", "refresh_token"]',
        'read write',
        'Default Client',
        NOW(),
        NOW()
    )
    ON CONFLICT (id) DO NOTHING;

    -- Insert a test user for development only
    -- Password is 'password' - this hash is a placeholder and will not work
    -- Generate proper hash: echo 'password' | argon2 somesalt -id -t 2 -m 19 -p 1
    INSERT INTO users (id, username, password_hash, email, enabled, created_at, updated_at)
    VALUES (
        'test-user-id',
        'testuser',
        '$argon2id$v=19$m=524288,t=2,p=1$c29tZXNhbHQxMjM0NTY3ODkwMTIzNDU$wA1qkO0rATEtNnS/xPbbgQ1234567890123456789012',
        'test@example.com',
      TRUE,
        NOW(),
        NOW()
    )
    ON CONFLICT (id) DO NOTHING;

  V6__make_tokens_user_id_nullable.sql: |
    -- Make tokens.user_id nullable so client_credentials tokens can be issued without a user
    -- (OAuth2 client credentials grant is typically client-only.)

    DO $$
    BEGIN
        -- Drop NOT NULL if it exists; keep this migration safe to run across environments.
        BEGIN
            ALTER TABLE tokens ALTER COLUMN user_id DROP NOT NULL;
        EXCEPTION
            WHEN undefined_table THEN
                RAISE NOTICE 'Table tokens does not exist; skipping';
            WHEN undefined_column THEN
                RAISE NOTICE 'Column tokens.user_id does not exist; skipping';
            WHEN undefined_object THEN
                -- Happens if the column is already nullable.
                RAISE NOTICE 'Column tokens.user_id already nullable; skipping';
        END;
    END $$;

  V7__add_role_to_users_table.sql: |
    -- Add role column to users table for RBAC support
    ALTER TABLE users ADD COLUMN IF NOT EXISTS role TEXT NOT NULL DEFAULT 'user';

  V8__add_signing_keys_table.sql: |
    -- Key storage for JWT key rotation.
    -- key_material is encrypted at rest using AES-256-GCM with the JWT secret as KEK.
    CREATE TABLE signing_keys (
        id TEXT PRIMARY KEY,
        kid TEXT NOT NULL UNIQUE,
        algorithm TEXT NOT NULL,
        key_material BYTEA NOT NULL,
        is_current BOOLEAN NOT NULL DEFAULT FALSE,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        expires_at TIMESTAMP
    );

    CREATE INDEX idx_signing_keys_kid ON signing_keys(kid);
    CREATE INDEX idx_signing_keys_algorithm_current ON signing_keys(algorithm, is_current);

  V9__add_nonce_to_auth_codes.sql: |
    ALTER TABLE authorization_codes ADD COLUMN nonce TEXT;

  V10__add_token_family.sql: |
    -- Add token_family column for refresh token rotation replay detection
    -- (OAuth 2.0 Security BCP §4.13.2)
    ALTER TABLE tokens ADD COLUMN token_family TEXT;
    CREATE INDEX idx_tokens_token_family ON tokens(token_family);

  V11__create_device_authorizations_table.sql: |
    -- OAuth2 Device Authorization Grant (RFC 8628)
    CREATE TABLE IF NOT EXISTS device_authorizations (
        id TEXT PRIMARY KEY,
        device_code TEXT NOT NULL UNIQUE,
        user_code TEXT NOT NULL UNIQUE,
        client_id TEXT NOT NULL,
        scope TEXT NOT NULL,
        created_at TIMESTAMPTZ NOT NULL,
        expires_at TIMESTAMPTZ NOT NULL,
        interval_seconds INTEGER NOT NULL,
        approved BOOLEAN NOT NULL DEFAULT FALSE,
        denied BOOLEAN NOT NULL DEFAULT FALSE,
        used BOOLEAN NOT NULL DEFAULT FALSE,
        user_id TEXT,
        FOREIGN KEY (client_id) REFERENCES clients(client_id),
        FOREIGN KEY (user_id) REFERENCES users(id)
    );

    CREATE INDEX IF NOT EXISTS idx_device_authorizations_device_code ON device_authorizations(device_code);
    CREATE INDEX IF NOT EXISTS idx_device_authorizations_user_code ON device_authorizations(user_code);
    CREATE INDEX IF NOT EXISTS idx_device_authorizations_client_id ON device_authorizations(client_id);

  V12__add_token_endpoint_auth_method.sql: |
    -- Add token_endpoint_auth_method to support public clients (RFC 7591 §2).
    -- Default to 'client_secret_basic' for all existing clients.
    ALTER TABLE clients ADD COLUMN token_endpoint_auth_method TEXT NOT NULL DEFAULT 'client_secret_basic';

  V13__add_rfc7591_client_metadata.sql: |
    -- RFC 7591 / RFC 7592: Dynamic Client Registration metadata fields
    ALTER TABLE clients ADD COLUMN registration_access_token TEXT NOT NULL DEFAULT '';
    ALTER TABLE clients ADD COLUMN response_types TEXT NOT NULL DEFAULT '["code"]';
    ALTER TABLE clients ADD COLUMN contacts TEXT NOT NULL DEFAULT '';
    ALTER TABLE clients ADD COLUMN logo_uri TEXT NOT NULL DEFAULT '';
    ALTER TABLE clients ADD COLUMN client_uri TEXT NOT NULL DEFAULT '';
    ALTER TABLE clients ADD COLUMN policy_uri TEXT NOT NULL DEFAULT '';
    ALTER TABLE clients ADD COLUMN tos_uri TEXT NOT NULL DEFAULT '';

    -- RFC 7523: JWT client authentication keys
    ALTER TABLE clients ADD COLUMN jwks TEXT NOT NULL DEFAULT '';
    ALTER TABLE clients ADD COLUMN jwks_uri TEXT NOT NULL DEFAULT '';

  V14__add_resource_to_auth_codes.sql: |
    -- RFC 8707: Resource Indicators — store the requested resource URI on authorization codes
    -- so it can be threaded through to the access token's audience claim.
    ALTER TABLE authorization_codes ADD COLUMN resource TEXT;

  V15__add_wave4_fields_to_auth_codes.sql: |
    -- Wave 4: RFC 9396 (RAR) + OIDC Core §5.5 (Claims Request)
    -- These columns are nullable so existing rows continue to read as NULL.
    ALTER TABLE authorization_codes ADD COLUMN authorization_details TEXT;
    ALTER TABLE authorization_codes ADD COLUMN claims_request TEXT;

  V16__add_oidc_session_logout_fields.sql: |
    -- OIDC Back-Channel Logout, Front-Channel Logout, and RP-Initiated Logout fields
    ALTER TABLE clients ADD COLUMN backchannel_logout_uri TEXT NOT NULL DEFAULT '';
    ALTER TABLE clients ADD COLUMN backchannel_logout_session_required BOOLEAN NOT NULL DEFAULT FALSE;
    ALTER TABLE clients ADD COLUMN frontchannel_logout_uri TEXT NOT NULL DEFAULT '';
    ALTER TABLE clients ADD COLUMN frontchannel_logout_session_required BOOLEAN NOT NULL DEFAULT FALSE;
    ALTER TABLE clients ADD COLUMN post_logout_redirect_uris TEXT NOT NULL DEFAULT '';
