apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-server
  labels:
    app: oauth2-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oauth2-server
  template:
    metadata:
      labels:
        app: oauth2-server
    spec:
      serviceAccountName: oauth2-server
      initContainers:
        - name: wait-for-migrations
          image: bitnami/kubectl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for database migrations job to complete..."
              if ! kubectl wait --for=condition=complete --timeout=300s job/flyway-migration -n "${KUBERNETES_NAMESPACE}"; then
                echo "ERROR: Database migration failed or timed out. Check flyway-migration job logs for details." >&2
                exit 1
              fi
              echo "Migration job completed successfully."
          env:
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
      containers:
        - name: oauth2-server
          image: docker.io/ianlintner068/oauth2-server:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              export OAUTH2_DATABASE_URL="postgresql://oauth2_user:${POSTGRES_PASSWORD}@postgres:5432/oauth2"
              exec /app/rust_oauth2_server
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: oauth2-server-config
            - secretRef:
                name: oauth2-server-secret
          env:
            - name: OAUTH2_SERVER_HOST
              valueFrom:
                configMapKeyRef:
                  name: oauth2-server-config
                  key: OAUTH2_SERVER_HOST
            - name: OAUTH2_SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: oauth2-server-config
                  key: OAUTH2_SERVER_PORT
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oauth2-server-secret
                  key: POSTGRES_PASSWORD
            - name: OAUTH2_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-server-secret
                  key: OAUTH2_JWT_SECRET
            - name: OAUTH2_SEED_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oauth2-server-secret
                  key: OAUTH2_SEED_PASSWORD
            - name: OAUTH2_SESSION_KEY
              valueFrom:
                secretKeyRef:
                  name: oauth2-server-secret
                  key: OAUTH2_SESSION_KEY
            - name: OAUTH2_DATABASE_MAX_CONNECTIONS
              valueFrom:
                configMapKeyRef:
                  name: oauth2-server-config
                  key: OAUTH2_DATABASE_MAX_CONNECTIONS
            - name: OAUTH2_DATABASE_MIN_CONNECTIONS
              valueFrom:
                configMapKeyRef:
                  name: oauth2-server-config
                  key: OAUTH2_DATABASE_MIN_CONNECTIONS
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: oauth2-server-config
                  key: RUST_LOG
            - name: RUST_BACKTRACE
              valueFrom:
                configMapKeyRef:
                  name: oauth2-server-config
                  key: RUST_BACKTRACE
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
