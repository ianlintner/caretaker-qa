apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-server
  labels:
    app: oauth2-server
    # Paved-path spec §1 rule 4 — standard workload labels.
    app.kubernetes.io/name: oauth2-server
    app.kubernetes.io/instance: oauth2-server
    app.kubernetes.io/component: authorization-server
    app.kubernetes.io/part-of: identity-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oauth2-server
  template:
    metadata:
      labels:
        app: oauth2-server
        app.kubernetes.io/name: oauth2-server
        app.kubernetes.io/instance: oauth2-server
        app.kubernetes.io/component: authorization-server
        app.kubernetes.io/part-of: identity-platform
        app.kubernetes.io/managed-by: kustomize
    spec:
      serviceAccountName: oauth2-server
      containers:
        - name: oauth2-server
          image: docker.io/example/oauth2-server:latest
          imagePullPolicy: IfNotPresent
          command: ["/app/rust_oauth2_server"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: oauth2-server-config
            - secretRef:
                name: oauth2-server-secret
          env:
            # Map the generic MONGODB_CONNECTION_STRING secret key onto the
            # OAUTH2_DATABASE_URL env var the binary actually reads. The
            # Dockerfile bakes in a sqlite default for OAUTH2_DATABASE_URL,
            # so this override is required whenever the deployment backs
            # onto MongoDB / Cosmos DB.
            - name: OAUTH2_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: oauth2-server-secret
                  key: MONGODB_CONNECTION_STRING
            - name: OAUTH2_SERVER_HOST
              valueFrom:
                configMapKeyRef:
                  name: oauth2-server-config
                  key: OAUTH2_SERVER_HOST
            - name: OAUTH2_SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: oauth2-server-config
                  key: OAUTH2_SERVER_PORT
            - name: OAUTH2_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-server-secret
                  key: OAUTH2_JWT_SECRET
            - name: OAUTH2_SEED_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oauth2-server-secret
                  key: OAUTH2_SEED_PASSWORD
            - name: OAUTH2_SESSION_KEY
              valueFrom:
                secretKeyRef:
                  name: oauth2-server-secret
                  key: OAUTH2_SESSION_KEY
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: oauth2-server-config
                  key: RUST_LOG
            - name: RUST_BACKTRACE
              valueFrom:
                configMapKeyRef:
                  name: oauth2-server-config
                  key: RUST_BACKTRACE
            - name: OAUTH2_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-server-secret
                  key: OAUTH2_GOOGLE_CLIENT_ID
                  optional: true
            - name: OAUTH2_GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-server-secret
                  key: OAUTH2_GOOGLE_CLIENT_SECRET
                  optional: true
            - name: OAUTH2_GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-server-secret
                  key: OAUTH2_GITHUB_CLIENT_ID
                  optional: true
            - name: OAUTH2_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-server-secret
                  key: OAUTH2_GITHUB_CLIENT_SECRET
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
          resources:
            requests:
              memory: "256Mi"
              cpu: "25m"
            limits:
              memory: "512Mi"
              cpu: "200m"
