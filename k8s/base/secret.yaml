apiVersion: v1
kind: Secret
metadata:
  name: oauth2-server-secret
  annotations:
    # WARNING: These are example values for development/testing only!
    # NEVER use these default values in production environments.
    # Generate secure random values before deploying:
    #   JWT Secret: openssl rand -base64 32
    #   DB Password: openssl rand -base64 20
type: Opaque
stringData:
  OAUTH2_JWT_SECRET: "change-me-in-production-use-a-secure-random-value-at-least-32-characters"
  # Seed/admin password used during bootstrap. Override this in production.
  OAUTH2_SEED_PASSWORD: "change-me-in-production-use-a-secure-random-password"
  # MongoDB connection string — override in production with the real Cosmos DB URI.
  MONGODB_CONNECTION_STRING: "mongodb://localhost:27017"
  # Session key for cookie signing — generate a real value in production:
  #   openssl rand -hex 64
  OAUTH2_SESSION_KEY: "000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f202122232425262728292a2b2c2d2e2f303132333435363738393a3b3c3d3e3f"
  # Optional distributed deployment DSNs. Store them here if they embed credentials.
  # OAUTH2_CACHE_REDIS_URL: "redis://redis:6379"
  # Optional: Social login credentials
  # OAUTH2_GOOGLE_CLIENT_ID: ""
  # OAUTH2_GOOGLE_CLIENT_SECRET: ""
  # OAUTH2_MICROSOFT_CLIENT_ID: ""
  # OAUTH2_MICROSOFT_CLIENT_SECRET: ""
  # OAUTH2_GITHUB_CLIENT_ID: ""
  # OAUTH2_GITHUB_CLIENT_SECRET: ""
