apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Distributed production profile:
# - multi-replica OAuth2 control plane
# - shared Redis for cross-pod rate limiting + L2 cache
# - PgBouncer in front of PostgreSQL
# - production-oriented PostgreSQL tuning
#
# Build/publish the image with at least:
#   cargo build --release --features distributed
# or via Docker build args:
#   --build-arg CARGO_FEATURES="distributed"

bases:
  - ../../base

components:
  - ../../components/distributed-ha
  - ../../components/redis
  - ../../components/pgbouncer
  - ../../components/postgres-tuning

commonLabels:
  environment: production
  topology.oauth2.io/profile: distributed

images:
  - name: docker.io/ianlintner068/oauth2-server
    newTag: v1.0.0
