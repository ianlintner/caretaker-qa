# Mount the Azure Key Vault CSI volume so the `oauth2-server-secrets`
# SecretProviderClass can sync its `secretObjects` into the
# `oauth2-server-secret` Kubernetes Secret. Without a Pod mount the
# CSI driver does not run, so the Secret never gets populated.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-server
spec:
  template:
    spec:
      containers:
        - name: oauth2-server
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: oauth2-server-secrets
