# Production hands secret management to the Azure Key Vault CSI driver
# (see `oauth2-server-secrets` SecretProviderClass). The base
# `oauth2-server-secret` contains placeholder values intended for local /
# development overlays; applying it in production would overwrite the
# real, Key-Vault-sourced secret and bring the pod into an immediate
# CrashLoopBackOff.
#
# `$patch: delete` drops the base Secret from the rendered overlay
# without adding anything in its place — Flux stops managing the
# Secret, and the CSI driver continues to sync values from Key Vault
# whenever a Pod mounts the `secrets-store` volume below.
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-server-secret
$patch: delete
