apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: oauth2-server-secrets
  namespace: default
  labels:
    app.kubernetes.io/name: oauth2-server
    app.kubernetes.io/instance: production
    environment: production
spec:
  provider: azure
  parameters:
    cloudName: ""
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "f2a13db4-007a-46c8-b155-28de1e7d24f6"
    keyvaultName: "oauth2-server-vault"
    tenantId: "42ddc44e-97dd-4c3b-bf8a-31c785e24c67"
    objects: |
      array:
        - |
          objectName: jwt-secret
          objectType: secret
          objectVersion: ""
        - |
          objectName: session-key
          objectType: secret
          objectVersion: ""
        - |
          objectName: oidc-id-token-private-key
          objectType: secret
          objectVersion: ""
        - |
          objectName: mongodb-connection-string
          objectType: secret
          objectVersion: ""
        - |
          objectName: github-client-id
          objectType: secret
          objectVersion: ""
        - |
          objectName: github-client-secret
          objectType: secret
          objectVersion: ""
        - |
          objectName: google-client-id
          objectType: secret
          objectVersion: ""
        - |
          objectName: google-client-secret
          objectType: secret
          objectVersion: ""
        - |
          objectName: seed-password
          objectType: secret
          objectVersion: ""
  secretObjects:
    - secretName: oauth2-server-secret
      type: Opaque
      data:
        - objectName: jwt-secret
          key: OAUTH2_JWT_SECRET
        - objectName: session-key
          key: OAUTH2_SESSION_KEY
        - objectName: oidc-id-token-private-key
          key: OAUTH2_ID_TOKEN_PRIVATE_KEY_PEM
        - objectName: mongodb-connection-string
          key: MONGODB_CONNECTION_STRING
        - objectName: github-client-id
          key: OAUTH2_GITHUB_CLIENT_ID
        - objectName: github-client-secret
          key: OAUTH2_GITHUB_CLIENT_SECRET
        - objectName: google-client-id
          key: OAUTH2_GOOGLE_CLIENT_ID
        - objectName: google-client-secret
          key: OAUTH2_GOOGLE_CLIENT_SECRET
        - objectName: seed-password
          key: OAUTH2_SEED_PASSWORD
