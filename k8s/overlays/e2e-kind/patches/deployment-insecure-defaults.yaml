apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-server
spec:
  template:
    spec: # nosemgrep: yaml.kubernetes.security.run-as-non-root
      # This is a Kustomize patch file; the base deployment already defines runAsNonRoot: true.
      containers:
        - name: oauth2-server
          env:
            - name: OAUTH2_ALLOW_INSECURE_DEFAULTS
              value: "1"
