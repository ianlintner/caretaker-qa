apiVersion: v1
kind: Secret
metadata:
  name: oauth2-server-secret
stringData:
  OAUTH2_SEED_PASSWORD: "changeme"
  # KIND e2e: use sqlite in /tmp (writable by non-root UID 1000).
  # The default sqlite path (`oauth2.db` in cwd) lives under `/app`
  # which is owned by root in the image, so writes fail for runAsUser: 1000.
  # The base deployment maps MONGODB_CONNECTION_STRING -> OAUTH2_DATABASE_URL;
  # overriding the key here routes the app to SQLite without a valueFrom conflict.
  MONGODB_CONNECTION_STRING: "sqlite:/tmp/oauth2.db?mode=rwc"
