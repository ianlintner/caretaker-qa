apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-server
spec:
  template:
    spec: # nosemgrep: yaml.kubernetes.security.run-as-non-root
      # This is a Kustomize patch file; the base deployment already defines runAsNonRoot: true.
      containers:
        - name: oauth2-server
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_SERVICE_NAME
              value: oauth2-server
