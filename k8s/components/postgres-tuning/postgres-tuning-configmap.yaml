apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-tuning
data:
  postgresql.conf: |
    # =========================================================================
    # PostgreSQL tuning for OAuth2 workload (100K req/min target)
    # =========================================================================
    # Include the default packaged config first
    include_if_exists = '/usr/local/share/postgresql/postgresql.conf.sample'

    # --- Connections ---
    # Must accommodate: (app instances × max_connections_per_instance) + admin headroom
    # 12 instances × 50 conns = 600, plus ~50 headroom → 300 with PgBouncer
    max_connections = 300

    # --- Memory ---
    # Shared buffer cache — typically 25% of available RAM
    shared_buffers = 1GB
    # Per-query working memory for sorts/hashes
    work_mem = 8MB
    # Memory for maintenance (VACUUM, CREATE INDEX)
    maintenance_work_mem = 128MB
    # OS page cache awareness
    effective_cache_size = 3GB

    # --- WAL / Durability ---
    # Batch WAL writes for throughput (slight durability trade-off on crash)
    wal_level = replica
    synchronous_commit = on
    wal_buffers = 64MB
    checkpoint_completion_target = 0.9
    max_wal_size = 2GB
    min_wal_size = 512MB

    # --- Concurrency ---
    effective_io_concurrency = 200

    # --- Logging (operational) ---
    log_min_duration_statement = 500
    log_checkpoints = on
    log_lock_waits = on

    # --- Listen ---
    listen_addresses = '*'
    port = 5432
