apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
data:
  pgbouncer.ini: |
    [databases]
    oauth2 = host=postgres port=5432 dbname=oauth2

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 5432
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt

    ; Transaction-level pooling maximises connection reuse.
    pool_mode = transaction

    ; Total connections PgBouncer opens towards PostgreSQL.
    ; Should be ≤ PostgreSQL max_connections minus a margin for admin/maintenance.
    default_pool_size = 25
    max_client_conn = 600
    min_pool_size = 5

    ; Timeouts
    server_idle_timeout = 600
    server_lifetime = 3600
    query_timeout = 30

    ; Logging
    log_connections = 0
    log_disconnections = 0

  userlist.txt: |
    "oauth2_user" "oauth2_password"
