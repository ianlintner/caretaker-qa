apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - pgbouncer-deployment.yaml
  - pgbouncer-service.yaml
  - pgbouncer-configmap.yaml

patches:
  # Point the oauth2-server at PgBouncer instead of Postgres directly
  - target:
      kind: Deployment
      name: oauth2-server
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/args
        value:
          - |
            export OAUTH2_DATABASE_URL="postgresql://oauth2_user:${POSTGRES_PASSWORD}@pgbouncer:5432/oauth2"
            exec /app/rust_oauth2_server
