apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - redis-deployment.yaml
  - redis-service.yaml

patches:
  - target:
      kind: ConfigMap
      name: oauth2-server-config
    patch: |
      - op: add
        path: /data/OAUTH2_RATE_LIMIT_ENABLED
        value: "true"
      - op: add
        path: /data/OAUTH2_RATE_LIMIT_BACKEND
        value: "redis"
      - op: add
        path: /data/OAUTH2_RATE_LIMIT_REDIS_URL
        value: "redis://redis:6379"
  - target:
      kind: Deployment
      name: oauth2-server
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OAUTH2_RATE_LIMIT_ENABLED
          valueFrom:
            configMapKeyRef:
              name: oauth2-server-config
              key: OAUTH2_RATE_LIMIT_ENABLED
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OAUTH2_RATE_LIMIT_BACKEND
          valueFrom:
            configMapKeyRef:
              name: oauth2-server-config
              key: OAUTH2_RATE_LIMIT_BACKEND
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OAUTH2_RATE_LIMIT_REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: oauth2-server-config
              key: OAUTH2_RATE_LIMIT_REDIS_URL
